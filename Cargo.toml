[package]
name = "pinyin-sort"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.39", features = ["default", "derive", "env"] }
phf = { version = "0.11.3", features = ["default"] }
serde = { version = "1.0.219", features = ["default", "derive", "std", "alloc", "rc"] }
toml = { version = "0.8.22", features = ["default"] }

[build-dependencies]
phf_codegen = "0.11.3"
csv = "1.3.1"
