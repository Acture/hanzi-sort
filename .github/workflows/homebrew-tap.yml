name: Sync Homebrew Tap

on:
  # Trigger on the tag push itself rather than `release: published`: releases
  # are created by github-actions[bot] with GITHUB_TOKEN, and GitHub does not
  # fire workflow events from that token, so the `release` trigger never ran.
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync, for example v0.2.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-formula:
    runs-on: ubuntu-latest
    env:
      TAP_REPOSITORY: Acture/homebrew-ac
      FORMULA_DIR: Formula
      FORMULA_NAME: hanzi-sort.rb
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_REF: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "push" ]]; then
            tag="${PUSH_REF}"
          else
            tag="${DISPATCH_TAG}"
          fi
          version="${tag#v}"
          tarball_url="https://github.com/Acture/hanzi-sort/archive/refs/tags/${tag}.tar.gz"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=${tarball_url}" >> "$GITHUB_OUTPUT"

      - name: Download source tarball
        run: curl -fsSL "${{ steps.release.outputs.tarball_url }}" -o release.tar.gz

      - name: Compute SHA-256
        id: checksum
        shell: bash
        run: |
          set -euo pipefail
          sha256=$(sha256sum release.tar.gz | awk '{print $1}')
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Check out tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        run: |
          mkdir -p "homebrew-tap/${{ env.FORMULA_DIR }}"
          python3 scripts/update_homebrew_formula.py \
            --version "${{ steps.release.outputs.version }}" \
            --sha256 "${{ steps.checksum.outputs.sha256 }}" \
            --output "homebrew-tap/${{ env.FORMULA_DIR }}/${{ env.FORMULA_NAME }}"

      - name: Commit and push tap update
        working-directory: homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- "${{ env.FORMULA_DIR }}"; then
            echo "No formula changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${{ env.FORMULA_DIR }}/${{ env.FORMULA_NAME }}"
          git commit -m "hanzi-sort ${{ steps.release.outputs.version }}"
          git push
